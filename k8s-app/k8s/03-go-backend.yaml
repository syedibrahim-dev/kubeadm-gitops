# =============================================================================
# Go Backend — Deployment + ClusterIP Service
# Multi-stage build result: ~20MB distroless image (from 800MB Go SDK)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-backend
  namespace: test-app
  labels:
    app: go-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-backend
  template:
    metadata:
      labels:
        app: go-backend
    spec:
      containers:
      - name: go-backend
        image: ibrahimalish/go-backend:2c4a751a893537447c6a366342fa342cf78d230b
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: MONGO_URL
          value: "mongodb://mongodb:27017"
        - name: PORT
          value: "8080"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 20
        resources:
          requests:
            memory: "32Mi"
            cpu:    "50m"
          limits:
            memory: "128Mi"
            cpu:    "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: go-backend
  namespace: test-app
spec:
  selector:
    app: go-backend
  ports:
  - port:       8080
    targetPort: 8080
    name:       http
  type: ClusterIP
