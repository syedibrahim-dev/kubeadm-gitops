# =============================================================================
# Ingress — routes traffic between React frontend and Go backend
#
# Path routing (no rewrite — paths are passed as-is to the backend):
#   /api/*  →  go-backend:8080   (Go REST API handles /api/health, /api/items)
#   /*      →  react-frontend:80 (nginx serves React SPA static files)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: test-app
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # More specific path first — routes /api/* to Go backend
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: go-backend
            port:
              number: 8080
      # Catch-all — routes everything else to React frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: react-frontend
            port:
              number: 80
